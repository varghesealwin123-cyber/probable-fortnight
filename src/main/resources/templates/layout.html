<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Library Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/style-dark.css}">
    <!-- Global JS -->
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>

<div id="app-container" th:fragment="app-frame(activePage, content)">
    <!-- Sidebar Navigation -->
    <aside id="sidebar">
        <div class="brand">
            <i class="bi bi-book-half"></i>
            <span>CL library</span>
        </div>
        
        <ul class="nav-menu">
            <li class="nav-item" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                <a th:href="@{/}">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            
            <li class="nav-item" th:classappend="${activePage == 'books' ? 'active' : ''}">
                <a th:href="@{/books}">
                    <i class="bi bi-journal-text"></i>
                    <span>Books Inventory</span>
                </a>
            </li>
            
            <li class="nav-item" th:classappend="${activePage == 'students' ? 'active' : ''}" sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_LIBRARIAN')">
                <a th:href="@{/students}">
                    <i class="bi bi-people-fill"></i>
                    <span>Students</span>
                </a>
            </li>
            
            <li class="nav-item" th:classappend="${activePage == 'borrowing' ? 'active' : ''}" sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_LIBRARIAN')">
                <a th:href="@{/borrowing}">
                    <i class="bi bi-arrow-left-right"></i>
                    <span>Borrow & Return</span>
                </a>
            </li>

            <li class="nav-item" th:classappend="${activePage == 'reports' ? 'active' : ''}" sec:authorize="hasRole('ROLE_ADMIN')">
                <a th:href="@{/reports}">
                    <i class="bi bi-bar-chart-line-fill"></i>
                    <span>Reports & Statistics</span>
                </a>
            </li>
        </ul>
        
        <!-- User profile section -->
        <div class="user-profile">
            <div class="avatar" th:text="${#strings.substring(username, 0, 1).toUpperCase()}">U</div>
            <div class="details">
                <span class="name" th:text="${username}">Username</span>
                <span class="role-badge" th:text="${roleShort}">Role</span>
            </div>
            <form th:action="@{/logout}" method="post" class="d-inline m-0 p-0">
                <button type="submit" class="logout-btn" title="Sign out">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content Frame -->
    <div id="main-content">
        <header>
            <div class="d-flex align-items-center gap-3">
                <button id="hamburger-btn" class="hamburger-btn" title="Menu">
                    <i class="bi bi-list"></i>
                </button>
                <div class="page-title" th:text="${titleText}">Page Title</div>
            </div>
            
            <div class="controls">
                <button id="theme-toggle-btn" class="theme-toggle" title="Toggle Theme">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
            </div>
        </header>

        <main class="content-wrapper">
            <div th:replace="${content}"></div>
        </main>
    </div>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
